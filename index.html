<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sir Mean School - Global Academy</title>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #07040f;">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from "react";
        import ReactDOM from "react-dom/client";
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "firebase/auth";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy, serverTimestamp, doc, setDoc, getDoc } from "firebase/firestore";

        // ─── Firebase Configuration ──────────────────────────────────────────
        const firebaseConfig = {
          apiKey: "AIzaSyBen1RjWtmaOE2Ec3LbQvldBvCVaTzYJWk",
          authDomain: "sirmeanacademy-14b84.firebaseapp.com",
          projectId: "sirmeanacademy-14b84",
          storageBucket: "sirmeanacademy-14b84.firebasestorage.app",
          messagingSenderId: "3897951834",
          appId: "1:3897951834:web:154b0d93abdf8ffc32ba63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Render Utility for Math formulas
        const renderLatex = (text) => {
          if (!text) return "";
          const parts = text.split(/(\$[^$]+\$)/g);
          return parts.map((part, i) => {
            if (part.startsWith("$") && part.endsWith("$")) {
              const eq = part.slice(1, -1);
              return <span key={i} style={{ fontFamily: "'Times New Roman', serif", fontStyle: "italic", color: "#a78bfa" }}>{eq}</span>;
            }
            return <span key={i}>{part}</span>;
          });
        };

        function EduLivePro() {
          const [currentUser, setCurrentUser] = useState(null);
          const [authEmail, setAuthEmail] = useState("");
          const [authPassword, setAuthPassword] = useState("");
          const [isRegistering, setIsRegistering] = useState(false);
          const [activeTab, setActiveTab] = useState("dashboard");
          const [courses, setCourses] = useState([]);
          const [chatMessages, setChatMessages] = useState([]);
          const [chatInput, setChatInput] = useState("");
          const [newCourseTitle, setNewCourseTitle] = useState("");
          const [newCourseCategory, setNewCourseCategory] = useState("Mathematics");
          const [mathInput, setMathInput] = useState("$f(x) = \\frac{d}{dx}[x^2 + 3x + 5]$");
          const [roomId, setRoomId] = useState("");
          const [isLive, setIsLive] = useState(false);
          const canvasRef = useRef(null);

          useEffect(() => {
            return onAuthStateChanged(auth, (user) => setCurrentUser(user));
          }, []);

          useEffect(() => {
            if (!currentUser) return;
            return onSnapshot(collection(db, "courses"), (snapshot) => {
              const list = [];
              snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
              setCourses(list);
            });
          }, [currentUser]);

          useEffect(() => {
            if (!currentUser) return;
            const q = query(collection(db, "global_chat"), orderBy("createdAt", "asc"));
            return onSnapshot(q, (snapshot) => {
              const msgs = [];
              snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
              setChatMessages(msgs);
            });
          }, [currentUser]);

          const handleAuth = async (e) => {
            e.preventDefault();
            try {
              if (isRegistering) {
                await createUserWithEmailAndPassword(auth, authEmail, authPassword);
              } else {
                await signInWithEmailAndPassword(auth, authEmail, authPassword);
              }
            } catch (err) { alert(err.message); }
          };

          const handleCreateCourse = async (e) => {
            e.preventDefault();
            if (!newCourseTitle.trim()) return;
            await addDoc(collection(db, "courses"), {
              title: newCourseTitle.trim(),
              category: newCourseCategory,
              instructor: currentUser.email,
              createdAt: serverTimestamp()
            });
            setNewCourseTitle("");
          };

          const sendChat = async () => {
            if (!chatInput.trim()) return;
            await addDoc(collection(db, "global_chat"), {
              user: currentUser.email,
              msg: chatInput.trim(),
              createdAt: serverTimestamp()
            });
            setChatInput("");
          };

          if (!currentUser) {
            return (
              <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center", fontFamily: "sans-serif" }}>
                <div style={{ background: "#0d0720", padding: 40, borderRadius: 16, width: 320, border: "1px solid #3b1d6e" }}>
                  <h2 style={{ color: "#a78bfa", textAlign: "center" }}>Sir Mean School</h2>
                  <form onSubmit={handleAuth} style={{ marginTop: 20 }}>
                    <input type="email" placeholder="Email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} style={{ width: "100%", padding: 10, marginBottom: 10, background: "#1b113a", border: "1px solid #3b1d6e", color: "#fff", borderRadius: 6 }} />
                    <input type="password" placeholder="Password" value={authPassword} onChange={e => setAuthPassword(e.target.value)} style={{ width: "100%", padding: 10, marginBottom: 20, background: "#1b113a", border: "1px solid #3b1d6e", color: "#fff", borderRadius: 6 }} />
                    <button type="submit" style={{ width: "100%", padding: 10, background: "#7c3aed", color: "#fff", border: "none", borderRadius: 6, fontWeight: "bold" }}>
                      {isRegistering ? "Register" : "Login"}
                    </button>
                  </form>
                  <button onClick={() => setIsRegistering(!isRegistering)} style={{ background: "transparent", border: "none", color: "#a78bfa", marginTop: 15, width: "100%" }}>
                    {isRegistering ? "Switch to Login" : "Switch to Register"}
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div style={{ display: "flex", height: "100vh", fontFamily: "sans-serif" }}>
              <aside style={{ width: 200, background: "#0d0720", padding: 20, borderRight: "1px solid #222" }}>
                <h3 style={{ color: "#a78bfa" }}>Sir Mean Hub</h3>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 20 }}>
                  <button onClick={() => setActiveTab("dashboard")} style={{ padding: 10, background: activeTab === "dashboard" ? "#7c3aed" : "transparent", color: "#fff", border: "none", textAlign: "left", borderRadius: 6 }}>Dashboard</button>
                  <button onClick={() => setActiveTab("live")} style={{ padding: 10, background: activeTab === "live" ? "#7c3aed" : "transparent", color: "#fff", border: "none", textAlign: "left", borderRadius: 6 }}>Live Room</button>
                  <button onClick={() => setActiveTab("math")} style={{ padding: 10, background: activeTab === "math" ? "#7c3aed" : "transparent", color: "#fff", border: "none", textAlign: "left", borderRadius: 6 }}>Math Matrix</button>
                  <button onClick={() => setActiveTab("courses")} style={{ padding: 10, background: activeTab === "courses" ? "#7c3aed" : "transparent", color: "#fff", border: "none", textAlign: "left", borderRadius: 6 }}>Courses Portal</button>
                </div>
                <button onClick={() => signOut(auth)} style={{ marginTop: 40, width: "100%", padding: 8, background: "#dc2626", color: "#fff", border: "none", borderRadius: 6 }}>Log Out</button>
              </aside>

              <main style={{ flex: 1, padding: 30, overflowY: "auto" }}>
                {activeTab === "dashboard" && (
                  <div>
                    <h1>Workspace Dashboard</h1>
                    <p style={{ color: "#7a6a9a" }}>Logged in as: {currentUser.email}</p>
                  </div>
                )}

                {activeTab === "live" && (
                  <div>
                    <h2>Live Classroom Stream Setup</h2>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 20, marginTop: 15 }}>
                      <div style={{ background: "#0d0720", height: 300, borderRadius: 8, padding: 20 }}>
                        <p>Stream Camera Feed Node Window</p>
                        <button onClick={() => setIsLive(!isLive)} style={{ padding: 10, background: isLive ? "#dc2626" : "#059669", color: "#fff", border: "none", borderRadius: 6 }}>
                          {isLive ? "End Stream Session" : "Start Live Broadcast"}
                        </button>
                      </div>
                      <div style={{ background: "#0d0720", borderRadius: 8, display: "flex", flexDirection: "column", height: 300 }}>
                        <div style={{ flex: 1, padding: 10, overflowY: "auto", fontSize: 13 }}>
                          {chatMessages.map(m => (
                            <div key={m.id} style={{ marginBottom: 5 }}><strong style={{ color: "#a78bfa" }}>{m.user?.split("@")[0]}:</strong> {renderLatex(m.msg)}</div>
                          ))}
                        </div>
                        <div style={{ padding: 10, borderTop: "1px solid #222", display: "flex", gap: 5 }}>
                          <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChat()} style={{ flex: 1, background: "#1b113a", border: "none", padding: 8, color: "#fff" }} placeholder="Type message..." />
                          <button onClick={sendChat} style={{ background: "#7c3aed", color: "#fff", border: "none", padding: "8px 12px" }}>Send</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === "math" && (
                  <div>
                    <h2>LaTeX Formulation Editor</h2>
                    <textarea value={mathInput} onChange={e => setMathInput(e.target.value)} style={{ width: "100%", height: 80, background: "#0d0720", color: "#fff", border: "1px solid #3b1d6e", marginTop: 15, padding: 10 }} />
                    <div style={{ marginTop: 15, padding: 20, background: "#0d0720", borderRadius: 6 }}>
                      <h4>Compiled Preview Output:</h4>
                      <div style={{ fontSize: 18, marginTop: 10 }}>{renderLatex(mathInput)}</div>
                    </div>
                  </div>
                )}

                {activeTab === "courses" && (
                  <div>
                    <h2>Course Management Hub</h2>
                    <form onSubmit={handleCreateCourse} style={{ display: "flex", gap: 10, marginTop: 15 }}>
                      <input type="text" placeholder="Course Title..." value={newCourseTitle} onChange={e => setNewCourseTitle(e.target.value)} style={{ flex: 1, padding: 10, background: "#0d0720", color: "#fff", border: "1px solid #3b1d6e" }} />
                      <select value={newCourseCategory} onChange={e => setNewCourseCategory(e.target.value)} style={{ background: "#0d0720", color: "#fff", border: "1px solid #3b1d6e", padding: 10 }}>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Statistics">Statistics</option>
                        <option value="Data Science">Data Science</option>
                      </select>
                      <button type="submit" style={{ padding: "10px 20px", background: "#7c3aed", color: "#fff", border: "none" }}>Add Row</button>
                    </form>
                    <div style={{ marginTop: 20 }}>
                      {courses.map(c => (
                        <div key={c.id} style={{ background: "#0d0720", padding: 12, borderRadius: 6, marginBottom: 8 }}>
                          <strong>{c.title}</strong> - <span style={{ color: "#a78bfa" }}>{c.category}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<EduLivePro />);
    </script>
</body>
</html>
